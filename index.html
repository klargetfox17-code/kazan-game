<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {background:#0f172a;color:white;font-family:sans-serif;}
.container{padding:15px;}
.card{background:#1e293b;border-radius:15px;padding:15px;margin-bottom:10px;}
button{
width:100%;
padding:18px;
font-size:20px;
margin-top:10px;
border:none;
border-radius:12px;
background:#22c55e;
}
.log{background:#020617;padding:10px;height:120px;overflow:auto;}
.tab{display:none;}
.active{display:block;}
</style>

</head>

<body>

<div class="container">

<div id="start" class="tab active"></div>

<div id="main" class="tab">

<h2 id="username"></h2>

<div class="card">
<h3 id="clan"></h3>
<p id="bonus"></p>
</div>

<div class="card">
Сила: <b id="m_strength"></b><br>
Ловкость: <b id="m_agility"></b><br>
Харизма: <b id="m_charisma"></b>
</div>

<div class="card">
Очки: <b id="points"></b><br>
Энергия: <b id="energy"></b>/<span id="maxEnergy"></span><br>
⏳ <b id="timer"></b>
</div>

<button onclick="openTab('actions')">⚡ Действия</button>

<div class="log" id="log"></div>

<button onclick="resetGame()" style="background:#ef4444;margin-top:30px;">
Сбросить игру
</button>

</div>

<div id="actions" class="tab">

<h2>Действия</h2>

<div id="actionsStats"></div>

<button onclick="mission()">
🗡 Миссия (-2 энергия)<br>
<small>Даёт много очков и прокачивает ЛОВКОСТЬ</small>
</button>

<button onclick="openAttack()">
💣 Пакость (-5 энергия)<br>
<small>Грабишь игроков или бьёшь район, качает СИЛУ</small>
</button>

<button onclick="activity()">
🎉 Активность (-1 энергия)<br>
<small>Стабильный доход, качает ХАРИЗМУ</small>
</button>

<div class="log" id="logActions"></div>

<button onclick="openTab('main')">⬅ Назад</button>

</div>

<div id="attack" class="tab">
<h2>💣 Атака</h2>
<div id="attackUI"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
