<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {background:#0f172a;color:white;font-family:sans-serif;font-size:22px;}
.container{padding:15px;}
.card{background:#1e293b;border-radius:15px;padding:20px;margin-bottom:15px;}
button{
width:100%;
padding:22px;
font-size:24px;
margin-top:12px;
border:none;
border-radius:14px;
background:#22c55e;
}
.tab{display:none;}
.active{display:block;}
.log{background:#020617;padding:15px;height:150px;overflow:auto;}
</style>

</head>

<body>

<div class="container">

<div id="start" class="tab active"></div>

<div id="main" class="tab">

<h1 id="username"></h1>
<h2>Уровень: <span id="lvl"></span></h2>
<div class="card">
<h2 id="clan"></h2>
<p id="bonus"></p>
</div>

<div class="card">
💪 Сила: <b id="m_strength"></b><br>
⚡ Ловкость: <b id="m_agility"></b><br>
🎭 Харизма: <b id="m_charisma"></b>
</div>

<div class="card">
Очки: <b id="points"></b><br>
Энергия: <b id="energy"></b>/<span id="maxEnergy"></span><br>
⏳ <b id="timer"></b>
</div>

<button onclick="openTab('actions')">⚡ Действия</button>
<button onclick="showTop()">🏆 ТОП игроков</button>

<button onclick="resetGame()" style="background:#ef4444;margin-top:30px;">
Сбросить игру
</button>

</div>

<div id="actions" class="tab">

<h1>Действия</h1>

<div id="actionsStats"></div>

<button onclick="mission()">
🗡 Миссия (-2 энергия)<br>
<small>Даёт много очков, качает ЛОВКОСТЬ</small>
</button>

<button onclick="openAttack()">
💣 Пакость (-5 энергия)<br>
<small>Атака на район или игрока, качает СИЛУ</small>
</button>

<button onclick="activity()">
🎉 Активность (-1 энергия)<br>
<small>Стабильный доход, качает ХАРИЗМУ</small>
</button>

<button onclick="openTab('main')">⬅ Назад</button>

</div>

<div id="attack" class="tab">

<h1>💣 Атака</h1>

<div id="attackUI"></div>

<div class="log" id="attackLog"></div>

</div>

<div id="top" class="tab">
<div id="topList"></div>
<button onclick="openTab('main')">⬅ Назад</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
