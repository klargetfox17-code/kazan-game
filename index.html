<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazan Clans</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://telegram.org"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .container { padding: 15px; }
        .card { background: #1e293b; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #334155; }
        button { width: 100%; padding: 15px; font-size: 16px; margin-top: 10px; border: none; border-radius: 10px; background: #22c55e; color: white; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.98); }
        .log { background: #020617; padding: 10px; height: 80px; overflow-y: auto; font-size: 12px; border-radius: 10px; color: #94a3b8; text-align: left; margin-top: 10px; }
        .tab { display: none; }
        .active { display: block; }
        .char-img { width: 120px; height: 120px; margin: 10px auto; display: block; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- ВЫБОР РАЙОНА -->
        <div id="start" class="tab active">
            <h2>Загрузка Казани...</h2>
        </div>

        <!-- ГЛАВНЫЙ ЭКРАН -->
        <div id="main" class="tab">
            <h2 id="username">@player</h2>
            <img id="character" class="char-img" src="https://imgur.com">

            <div class="card">
                <h3 id="clan" style="margin:0;color:#22c55e;">Район</h3>
                <p id="bonus" style="font-size:13px;margin:5px 0 0 0;"></p>
            </div>

            <div class="card" style="display:flex; justify-content:space-around;">
                <div>💪 <b id="m_strength">1</b></div>
                <div>⚡ <b id="m_agility">1</b></div>
                <div>🎭 <b id="m_charisma">1</b></div>
            </div>

            <div class="card">
                🏆 Очки: <b id="points">0</b><br>
                ⚡ Энергия: <b id="energy">10</b>/<span id="maxEnergy">10</span><br>
                ⏳ <span id="timer">0 сек</span>
            </div>

            <button onclick="openTab('actions')" style="background:#3b82f6;">⚡ В город</button>
            <button onclick="loadTop()" style="background:#8b5cf6;">🏆 Рейтинг</button>
            <button onclick="resetGame()" style="background:#ef4444;margin-top:20px;padding:5px;font-size:11px;">Сброс</button>
            <div class="log" id="log"></div>
        </div>

        <!-- ДЕЙСТВИЯ -->
        <div id="actions" class="tab">
            <h2>Дела района</h2>
            <button onclick="mission()">🗡 Миссия (-2⚡)</button>
            <button onclick="activity()">🎉 Активность (-1⚡)</button>
            <button onclick="openAttack()" style="background:#f59e0b;">💣 Пакость (-5⚡)</button>
            <div id="attackUI"></div>
            <div class="log" id="logActions"></div>
            <button onclick="openTab('main')" style="background:#475569;">⬅ Назад</button>
        </div>

        <!-- ТОП -->
        <div id="top" class="tab">
            <h2>🏆 ТОП Игроков</h2>
            <div id="topList"></div>
            <button onclick="openTab('main')" style="background:#475569;">⬅ Назад</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
