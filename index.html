<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:sans-serif;
font-size:26px;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

button{
width:100%;
padding:25px;
margin-top:15px;
font-size:26px;
border:none;
border-radius:15px;
background:#22c55e;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

.tab{display:none;}
.active{display:block;}

.log{
background:black;
padding:10px;
height:150px;
overflow:auto;
}
</style>

</head>

<body>

<div class="container">

<div id="start" class="tab active"></div>

<div id="main" class="tab">

<h1 id="username"></h1>

<div class="card">
<h2 id="clan"></h2>
<p id="bonus"></p>
</div>

<div class="card">
💪 Сила: <span id="strength"></span><br>
⚡ Ловкость: <span id="agility"></span><br>
🎭 Харизма: <span id="charisma"></span>
</div>

<div class="card">
Очки: <b id="points"></b><br>
Энергия: <b id="energy"></b>/<span id="maxEnergy"></span><br>
⏳ <b id="timer"></b>
</div>

<button onclick="openTab('actions')">⚡ Действия</button>
<button onclick="openAttack()">💣 Атака</button>
<button onclick="showTop()">🏆 ТОП игроков</button>

<button onclick="resetGame()" style="background:red">
Сбросить игру
</button>

</div>

<div id="actions" class="tab">

<button onclick="mission()">🗡 Миссия (-2 энергия)</button>
<button onclick="activity()">🎉 Активность (-1 энергия)</button>

<div class="log" id="actionsLog"></div>

<button onclick="openTab('main')">⬅ Назад</button>

</div>

<div id="attack" class="tab">
<div id="attackUI"></div>
</div>

<div id="top" class="tab">
<div id="topList"></div>
<button onclick="openTab('main')">⬅ Назад</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
