<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {background:#0f172a;color:white;font-family:sans-serif;font-size:22px;}
.container{padding:15px;max-width:500px;margin:auto;}
.card{background:#1e293b;border-radius:15px;padding:20px;margin-bottom:15px;}
button{
width:100%;
padding:20px;
font-size:22px;
margin-top:10px;
border:none;
border-radius:12px;
background:#22c55e;
}
.tab{display:none;}
.active{display:block;}
.log{background:#020617;padding:10px;height:120px;overflow:auto;}
</style>

</head>

<body>

<div class="container">

<div id="start" class="tab active"></div>

<div id="main" class="tab">

<h1 id="username"></h1>
<h2>Уровень: <span id="lvl"></span></h2>

<div class="card">
<h2 id="clan"></h2>
<p id="bonus"></p>
</div>

<div class="card">
💪 <span id="m_strength"></span> |
⚡ <span id="m_agility"></span> |
🎭 <span id="m_charisma"></span>
</div>

<div class="card">
Очки: <b id="points"></b><br>
Энергия: <b id="energy"></b>/<span id="maxEnergy"></span><br>
⏳ <b id="timer"></b>
</div>

<button onclick="openTab('actions')">⚡ Действия</button>
<button onclick="showClanTop()">🏆 Районы</button>

<button onclick="resetGame()" style="background:#ef4444;">
Сброс
</button>

</div>

<div id="actions" class="tab">

<div id="actionsStats"></div>

<button onclick="mission()">🗡 Миссия (-2)</button>
<button onclick="openAttack()">💣 Атака (-5)</button>
<button onclick="activity()">🎉 Активность (-1)</button>

<div class="log" id="actionsLog"></div>

<button onclick="openTab('main')">⬅</button>

</div>

<div id="attack" class="tab">
<div id="attackUI"></div>
<div class="log" id="attackLog"></div>
</div>

<div id="clans" class="tab">
<div id="clanList"></div>
<button onclick="openTab('main')">⬅</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
